<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>momo Product Card Sample</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff7f0, #fff1e7);
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        overflow: hidden;
        width: min(100vw - 32px, 360px);
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 18px 40px rgba(67, 29, 16, 0.12);
      }

      .card__image {
        aspect-ratio: 1;
        padding: 18px;
        background: linear-gradient(180deg, #fff7f1, #ffe6d8);
      }

      .card__image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .card__content {
        padding: 18px;
      }

      .card__variant {
        margin: 0 0 10px;
        color: #b1542c;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .card__title {
        margin: 0;
        color: #2d1b16;
        font-size: 16px;
        line-height: 1.45;
      }

      .card__subtitle {
        margin: 10px 0 0;
        color: #72564b;
        line-height: 1.5;
      }

      .card__price-row {
        display: flex;
        gap: 10px;
        align-items: end;
        margin-top: 18px;
      }

      .card__price {
        margin: 0;
        color: #cf3b00;
        font-size: 28px;
        font-weight: 800;
      }

      .card__original {
        margin: 0 0 2px;
        color: #9d8578;
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <article class="card" id="card"></article>

    <script>
      async function bootstrapSample() {
        const response = await fetch('/mock/momo-products.json');
        const payload = await response.json();
        const item = payload.rtnData.goodsInfoList[0];

        document.querySelector('#card').innerHTML = `
          <div class="card__image">
            <img src="${item.imgUrl}" alt="${item.goodsName}">
          </div>
          <div class="card__content">
            <p class="card__variant">Recommendation</p>
            <h1 class="card__title">${item.goodsName}</h1>
            <p class="card__subtitle">${item.goodsSubName}</p>
            <div class="card__price-row">
              <p class="card__price">${item.goodsPrice}</p>
              <p class="card__original">${item.marketPrice}</p>
            </div>
          </div>
        `;
      }

      bootstrapSample();
    </script>
  </body>
</html>
